parameters:
  min_buy_score: 50
  min_sell_score: 60
  min_data_days: 220
  volume_threshold: 1.5
  max_extension_pct: 15.0
  min_price: 5.0
  min_adr_20: 4.0
  min_avg_dollar_volume: 20000000
  max_distance_from_52w_high: 25.0
  max_setup_risk_pct: 12.0
  cache_expiry_hours: 24

output:
  show_fundamentals: false
  show_phase_details: true
  save_to_file: true
  output_dir: "./data/results"
