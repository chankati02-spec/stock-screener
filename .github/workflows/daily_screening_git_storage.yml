name: Daily Stock Screening (Intraday EP + EOD Setup)

on:
  schedule:
    # 盤中 EP / BO 掃描：香港時間 21:45、22:15、22:45、23:15、23:45
    # 美股夏令時間適用；冬令時間要整體延後 1 小時
    - cron: '45 13 * * 1-5'
    - cron: '15 14 * * 1-5'
    - cron: '45 14 * * 1-5'
    - cron: '15 15 * * 1-5'
    - cron: '45 15 * * 1-5'

    # 盤後 setup 掃描：香港時間 Tue-Sat 05:37、06:12
    - cron: '37 21 * * 1-5'
    - cron: '12 22 * * 1-5'

  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: 'Force refresh all fundamentals (ignore cache)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: stock-screening-json
  cancel-in-progress: false

jobs:
  screen-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pyyaml requests

      - name: Run Intraday EP / EOD Setup Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import json
          import yaml
          import requests
          import yfinance as yf
          import pandas as pd
          import numpy as np

          from datetime import datetime, timedelta

          # =====================================================
          # Time / Mode detection
          # =====================================================

          now_utc = datetime.utcnow()
          hk_now = now_utc + timedelta(hours=8)
          hk_minutes = hk_now.hour * 60 + hk_now.minute

          # 盤中允許窗口：香港 21:35–00:30
          # 跨午夜，所以要用 OR
          INTRADAY_START = 21 * 60 + 35
          INTRADAY_END_AFTER_MIDNIGHT = 0 * 60 + 30

          # 盤後 setup：香港 05:20 之後都可以跑
          # 因為盤後只用 daily completed candle，不需要精準時間
          EOD_START = 5 * 60 + 20

          IS_INTRADAY_MODE = (
              hk_minutes >= INTRADAY_START
              or hk_minutes <= INTRADAY_END_AFTER_MIDNIGHT
          )

          IS_EOD_MODE = (
              hk_minutes >= EOD_START
              and not IS_INTRADAY_MODE
          )

          if not IS_INTRADAY_MODE and not IS_EOD_MODE:
              print(f"Outside allowed HK run window. HK time = {hk_now.strftime('%Y-%m-%d %H:%M')}. No Telegram sent.")
              raise SystemExit(0)

          MODE_NAME = "盤中 EP / BO 模式" if IS_INTRADAY_MODE else "盤後 Setup 模式"

          # 美股夏令時間 EDT：UTC 13:30 開市，UTC 20:00 收市
          # 冬令時間要改成 UTC 14:30 / 21:00，cron 亦要延後 1 小時
          MARKET_OPEN_UTC_HOUR = 13
          MARKET_OPEN_UTC_MINUTE = 30
          MARKET_SESSION_MINUTES = 390

          # =====================================================
          # Config
          # =====================================================

          MIN_PRICE = 5.0
          MIN_AVG_DOLLAR_VOLUME = 20_000_000
          MAX_STALE_DAYS = 3

          # Intraday EP / BO
          INTRADAY_MIN_TURNOVER = 20_000_000
          EP_MIN_DAY_CHANGE = 7.5
          EP_MIN_ADJ_RVOL = 3.0
          BO_MIN_DAY_CHANGE = 3.0
          BO_MIN_ADJ_RVOL = 2.0
          BO_MIN_ADR = 3.0

          # EOD setup common
          MAX_SETUP_RISK_PCT = 12.0

          # High Tight Leader
          HIGH_TIGHT_MAX_52W_DISTANCE = 25.0
          HIGH_TIGHT_MIN_ADR = 4.0
          HIGH_TIGHT_MIN_3M_RETURN = 25.0
          HIGH_TIGHT_MIN_SCORE = 50.0

          # Second Launch / Repair
          REPAIR_MAX_52W_DISTANCE = 60.0
          REPAIR_MIN_ADR = 4.0
          REPAIR_MIN_1M_RETURN = 8.0
          REPAIR_MIN_3M_RETURN = 20.0
          REPAIR_MIN_SCORE = 45.0

          # Base Breakout Watch
          BASE_MAX_52W_DISTANCE = 60.0
          BASE_MIN_ADR = 2.5
          BASE_MAX_ADR = 4.0
          BASE_MAX_RANGE_10 = 10.0
          BASE_MIN_1M_RETURN = 5.0
          BASE_MIN_SCORE = 45.0

          INVALID_TICKERS = {
              "INFO", "ATVI", "ALXN", "CELG", "CTXS", "MXIM", "NUAN",
              "ABC", "BLL", "COG", "DISCA", "DISCK", "DRE", "FISV",
              "KSU", "MYL", "NBL", "PEAK", "FB",
              "NDX", "ARKG",
              "INFQ", "SOLS", "IMSR", "SPCX", "EIP", "ILLM"
          }

          WATCH_DEBUG_TICKERS = {"AXP", "BRKR", "GEV", "WING"}

          # =====================================================
          # Basic helpers
          # =====================================================

          def debug_skip(ticker, reason):
              if ticker in WATCH_DEBUG_TICKERS:
                  print(f"DEBUG {ticker} skipped: {reason}")


          def clean_ticker(ticker):
              if ticker is None:
                  return None

              ticker = str(ticker).upper().strip()

              if not ticker:
                  return None

              ticker = ticker.split("#")[0].strip()
              ticker = ticker.replace(".", "-")

              if not ticker:
                  return None

              if ticker in INVALID_TICKERS:
                  return None

              if not ticker.replace("-", "").isalnum():
                  return None

              return ticker


          def flatten_yfinance_df(df):
              if df is None or df.empty:
                  return pd.DataFrame()

              if isinstance(df.columns, pd.MultiIndex):
                  df.columns = df.columns.get_level_values(0)

              return df


          def extract_ticker_df(data, ticker, batch_size):
              if data is None or data.empty:
                  return pd.DataFrame()

              try:
                  if batch_size == 1:
                      return flatten_yfinance_df(data.copy())

                  if isinstance(data.columns, pd.MultiIndex):
                      if ticker not in data.columns.levels[0]:
                          return pd.DataFrame()

                      return flatten_yfinance_df(data[ticker].copy())

                  return pd.DataFrame()

              except Exception:
                  return pd.DataFrame()


          def safe_pct_change(current, previous):
              if previous is None:
                  return 0.0

              if pd.isna(previous) or previous == 0:
                  return 0.0

              return ((current - previous) / previous) * 100.0


          def send_telegram_message(token, chat_id, text, max_len=3900):
              if not token or not chat_id:
                  print("Missing TELEGRAM_TOKEN or TELEGRAM_CHAT_ID")
                  print(text)
                  return False

              url = f"https://api.telegram.org/bot{token}/sendMessage"

              chunks = []
              current = ""

              for block in text.split("\n\n"):
                  if len(current) + len(block) + 2 <= max_len:
                      current += block + "\n\n"
                  else:
                      if current:
                          chunks.append(current)
                      current = block + "\n\n"

              if current:
                  chunks.append(current)

              ok = True

              for idx, chunk in enumerate(chunks):
                  response = requests.post(
                      url,
                      data={"chat_id": chat_id, "text": chunk},
                      timeout=20
                  )

                  if response.status_code != 200:
                      ok = False
                      print(f"Telegram chunk {idx + 1}/{len(chunks)} failed: {response.status_code} {response.text}")
                  else:
                      print(f"Telegram chunk {idx + 1}/{len(chunks)} sent")

              return ok


          def is_stale_daily_data(df, max_stale_days=MAX_STALE_DAYS):
              if df is None or df.empty:
                  return True, None, None

              clean_df = df.dropna(subset=["Close"])

              if clean_df.empty:
                  return True, None, None

              last_date = pd.Timestamp(clean_df.index[-1])

              if last_date.tzinfo is not None:
                  last_date = last_date.tz_convert(None)

              last_date_only = last_date.date()
              today_utc = datetime.utcnow().date()
              age_days = (today_utc - last_date_only).days

              return age_days > max_stale_days, last_date_only.strftime("%Y-%m-%d"), age_days


          def get_completed_daily_df(df, remove_today_partial=False):
              """
              Intraday mode:
                Remove today's possible partial daily bar, so prev_close / prev_high are from completed session.

              EOD mode:
                Do NOT remove latest daily bar. After US close, latest bar is what we want.
              """
              if df is None or df.empty:
                  return pd.DataFrame()

              df = df.dropna(subset=["Close", "High", "Low"]).copy()

              if df.empty:
                  return df

              if remove_today_partial:
                  today_utc = datetime.utcnow().date()
                  last_date = pd.Timestamp(df.index[-1]).date()

                  if last_date >= today_utc and len(df) >= 2:
                      df = df.iloc[:-1]

              return df


          # =====================================================
          # Indicator helpers
          # =====================================================

          def calculate_adr(df, period=20):
              if df is None or df.empty or len(df) < period:
                  return 0.0

              recent = df.iloc[-period:]
              adr_series = ((recent["High"] - recent["Low"]) / recent["Close"]) * 100
              adr = adr_series.mean()

              return float(adr) if not pd.isna(adr) else 0.0


          def calculate_avg_dollar_volume(df, period=20):
              if df is None or df.empty or len(df) < period:
                  return 0.0

              if "Volume" not in df.columns:
                  return 0.0

              recent = df.iloc[-period:]

              if recent["Volume"].isna().all():
                  return 0.0

              value = (recent["Close"] * recent["Volume"]).mean()

              return float(value) if not pd.isna(value) else 0.0


          def calculate_returns(df):
              close = df["Close"]
              current = float(close.iloc[-1])

              def get_return(days):
                  if len(close) <= days:
                      return 0.0

                  previous = float(close.iloc[-days])
                  return safe_pct_change(current, previous)

              return {
                  "ret_1m": get_return(21),
                  "ret_3m": get_return(63),
                  "ret_6m": get_return(126),
              }


          def calculate_distance_from_52w_high(df):
              if df is None or df.empty or len(df) < 100:
                  return 999.0

              recent = df.iloc[-252:] if len(df) >= 252 else df
              current = float(df["Close"].iloc[-1])
              high_52w = float(recent["High"].max())

              if high_52w <= 0:
                  return 999.0

              return ((high_52w - current) / high_52w) * 100.0


          def calculate_relative_strength(stock_df, benchmark_df, period=63):
              if stock_df is None or benchmark_df is None:
                  return 0.0

              if stock_df.empty or benchmark_df.empty:
                  return 0.0

              if len(stock_df) <= period or len(benchmark_df) <= period:
                  return 0.0

              stock_return = safe_pct_change(
                  float(stock_df["Close"].iloc[-1]),
                  float(stock_df["Close"].iloc[-period])
              )

              bench_return = safe_pct_change(
                  float(benchmark_df["Close"].iloc[-1]),
                  float(benchmark_df["Close"].iloc[-period])
              )

              return stock_return - bench_return


          def calculate_volume_dry_up(df):
              if df is None or df.empty or len(df) < 30:
                  return 0.0

              if "Volume" not in df.columns:
                  return 0.0

              volume = df["Volume"]

              if volume.isna().all():
                  return 0.0

              recent_5 = volume.iloc[-5:].mean()
              previous_20 = volume.iloc[-25:-5].mean()

              if pd.isna(recent_5) or pd.isna(previous_20) or previous_20 <= 0:
                  return 0.0

              ratio = recent_5 / previous_20

              if ratio <= 0.60:
                  return 100.0
              elif ratio <= 0.80:
                  return 70.0
              elif ratio <= 1.00:
                  return 40.0
              else:
                  return 0.0


          def estimate_pivot_stop_risk(df):
              if df is None or df.empty or len(df) < 15:
                  return None, None, None

              recent = df.iloc[-10:]

              pivot = float(recent["High"].max())
              stop = float(recent["Low"].min())

              if pivot <= 0 or stop <= 0 or stop >= pivot:
                  return round(pivot, 2), round(stop, 2), None

              risk_pct = ((pivot - stop) / pivot) * 100.0

              return round(pivot, 2), round(stop, 2), round(risk_pct, 2)


          def get_sma_details(df):
              close = df["Close"]

              sma_10 = close.rolling(10).mean().iloc[-1]
              sma_20 = close.rolling(20).mean().iloc[-1]
              sma_50 = close.rolling(50).mean().iloc[-1]
              sma_200 = close.rolling(200).mean().iloc[-1] if len(close) >= 200 else np.nan

              sma_50_prev = close.rolling(50).mean().iloc[-10] if len(close) >= 60 else np.nan

              sma_50_turning_up = False

              if not pd.isna(sma_50) and not pd.isna(sma_50_prev):
                  sma_50_turning_up = sma_50 > sma_50_prev

              return {
                  "sma_10": float(sma_10) if not pd.isna(sma_10) else np.nan,
                  "sma_20": float(sma_20) if not pd.isna(sma_20) else np.nan,
                  "sma_50": float(sma_50) if not pd.isna(sma_50) else np.nan,
                  "sma_200": float(sma_200) if not pd.isna(sma_200) else np.nan,
                  "sma_50_turning_up": sma_50_turning_up,
              }


          def calculate_intraday_indicators(intraday_df):
              df = intraday_df.copy()
              df = df.dropna(subset=["Close", "High", "Low", "Volume"])

              if df.empty:
                  return None

              typical_price = (df["High"] + df["Low"] + df["Close"]) / 3
              cumulative_pv = (typical_price * df["Volume"]).cumsum()
              cumulative_vol = df["Volume"].cumsum()

              df["VWAP"] = cumulative_pv / cumulative_vol.replace(0, np.nan)
              df["EMA9"] = df["Close"].ewm(span=9, adjust=False).mean()
              df["EMA20"] = df["Close"].ewm(span=20, adjust=False).mean()

              opening_bars = min(6, len(df))
              opening_range_high = float(df["High"].iloc[:opening_bars].max())

              latest = df.iloc[-1]

              return {
                  "df": df,
                  "price": float(latest["Close"]),
                  "vwap": float(latest["VWAP"]) if not pd.isna(latest["VWAP"]) else None,
                  "ema9": float(latest["EMA9"]) if not pd.isna(latest["EMA9"]) else None,
                  "ema20": float(latest["EMA20"]) if not pd.isna(latest["EMA20"]) else None,
                  "opening_range_high": opening_range_high,
                  "volume_sum": float(df["Volume"].sum()),
                  "data_time": str(df.index[-1]),
              }


          # =====================================================
          # EOD scoring
          # =====================================================

          def calculate_momentum_score(df, spy_df=None, qqq_df=None):
              if df is None or df.empty or len(df) < 200:
                  return 0.0, {}

              current_price = float(df["Close"].iloc[-1])
              sma = get_sma_details(df)
              returns = calculate_returns(df)
              distance_52w = calculate_distance_from_52w_high(df)

              rs_spy = calculate_relative_strength(df, spy_df, period=63)
              rs_qqq = calculate_relative_strength(df, qqq_df, period=63)

              score = 0.0

              if not pd.isna(sma["sma_10"]) and current_price > sma["sma_10"]:
                  score += 5
              if not pd.isna(sma["sma_20"]) and current_price > sma["sma_20"]:
                  score += 5
              if not pd.isna(sma["sma_50"]) and current_price > sma["sma_50"]:
                  score += 7
              if not pd.isna(sma["sma_200"]) and current_price > sma["sma_200"]:
                  score += 8

              if returns["ret_1m"] >= 20:
                  score += 10
              elif returns["ret_1m"] >= 10:
                  score += 5

              if returns["ret_3m"] >= 50:
                  score += 12
              elif returns["ret_3m"] >= 25:
                  score += 7

              if returns["ret_6m"] >= 100:
                  score += 8
              elif returns["ret_6m"] >= 50:
                  score += 4

              if distance_52w <= 5:
                  score += 15
              elif distance_52w <= 10:
                  score += 10
              elif distance_52w <= 25:
                  score += 5
              elif distance_52w <= 60:
                  score += 2

              if rs_spy > 20:
                  score += 10
              elif rs_spy > 10:
                  score += 6
              elif rs_spy > 0:
                  score += 3

              if rs_qqq > 20:
                  score += 10
              elif rs_qqq > 10:
                  score += 6
              elif rs_qqq > 0:
                  score += 3

              extension_from_10sma = 999.0

              if not pd.isna(sma["sma_10"]) and sma["sma_10"] > 0:
                  extension_from_10sma = ((current_price - sma["sma_10"]) / sma["sma_10"]) * 100.0

                  if 0 <= extension_from_10sma <= 8:
                      score += 10
                  elif 8 < extension_from_10sma <= 15:
                      score += 4

              details = {
                  **sma,
                  "ret_1m": returns["ret_1m"],
                  "ret_3m": returns["ret_3m"],
                  "ret_6m": returns["ret_6m"],
                  "distance_52w": distance_52w,
                  "rs_spy": rs_spy,
                  "rs_qqq": rs_qqq,
                  "extension_from_10sma": extension_from_10sma,
              }

              return min(score, 100.0), details


          def calculate_consolidation_score(df):
              if df is None or df.empty or len(df) < 80:
                  return 0.0, {}

              current_price = float(df["Close"].iloc[-1])

              recent_10 = df.iloc[-10:]
              high_10 = float(recent_10["High"].max())
              low_10 = float(recent_10["Low"].min())

              if low_10 <= 0:
                  return 0.0, {}

              range_10_pct = ((high_10 - low_10) / low_10) * 100.0

              price_50_days_ago = float(df["Close"].iloc[-50])
              impulse_50d = safe_pct_change(current_price, price_50_days_ago)

              distance_52w = calculate_distance_from_52w_high(df)
              dry_up_score = calculate_volume_dry_up(df)
              pivot, stop, risk_pct = estimate_pivot_stop_risk(df)

              score = 0.0

              if range_10_pct <= 5:
                  score += 30
              elif range_10_pct <= 8:
                  score += 22
              elif range_10_pct <= 10:
                  score += 16
              elif range_10_pct <= 12:
                  score += 8

              if impulse_50d >= 50:
                  score += 20
              elif impulse_50d >= 30:
                  score += 15
              elif impulse_50d >= 20:
                  score += 8

              if distance_52w <= 5:
                  score += 15
              elif distance_52w <= 10:
                  score += 10
              elif distance_52w <= 25:
                  score += 5
              elif distance_52w <= 60:
                  score += 2

              if dry_up_score >= 100:
                  score += 20
              elif dry_up_score >= 70:
                  score += 14
              elif dry_up_score >= 40:
                  score += 7

              if risk_pct is not None:
                  if risk_pct <= 6:
                      score += 15
                  elif risk_pct <= 8:
                      score += 10
                  elif risk_pct <= 12:
                      score += 5

              details = {
                  "range_10_pct": range_10_pct,
                  "impulse_50d": impulse_50d,
                  "distance_52w": distance_52w,
                  "volume_dry_up_score": dry_up_score,
                  "pivot": pivot,
                  "stop": stop,
                  "risk_pct": risk_pct,
              }

              return min(score, 100.0), details


          def classify_eod_setup(
              current_price,
              adr_20,
              avg_dollar_volume,
              returns,
              distance_52w,
              risk_pct,
              sma_details,
              consolidation_details
          ):
              if avg_dollar_volume < MIN_AVG_DOLLAR_VOLUME:
                  return None

              if risk_pct is None or risk_pct > MAX_SETUP_RISK_PCT:
                  return None

              sma_20 = sma_details.get("sma_20", np.nan)
              sma_50 = sma_details.get("sma_50", np.nan)
              sma_200 = sma_details.get("sma_200", np.nan)
              sma_50_turning_up = sma_details.get("sma_50_turning_up", False)

              above_20 = not pd.isna(sma_20) and current_price > sma_20
              above_50 = not pd.isna(sma_50) and current_price > sma_50
              above_200 = not pd.isna(sma_200) and current_price > sma_200

              range_10_pct = consolidation_details.get("range_10_pct", 999.0)
              dry_up = consolidation_details.get("volume_dry_up_score", 0.0)

              is_high_tight = (
                  distance_52w <= HIGH_TIGHT_MAX_52W_DISTANCE
                  and adr_20 >= HIGH_TIGHT_MIN_ADR
                  and returns["ret_3m"] >= HIGH_TIGHT_MIN_3M_RETURN
                  and above_50
                  and above_200
                  and range_10_pct <= 12
              )

              if is_high_tight:
                  return "High Tight Leader"

              is_repair = (
                  distance_52w <= REPAIR_MAX_52W_DISTANCE
                  and adr_20 >= REPAIR_MIN_ADR
                  and returns["ret_1m"] >= REPAIR_MIN_1M_RETURN
                  and returns["ret_3m"] >= REPAIR_MIN_3M_RETURN
                  and above_50
                  and above_200
                  and sma_50_turning_up
              )

              if is_repair:
                  return "Second Launch / Repair"

              is_base_watch = (
                  distance_52w <= BASE_MAX_52W_DISTANCE
                  and BASE_MIN_ADR <= adr_20 <= BASE_MAX_ADR
                  and returns["ret_1m"] >= BASE_MIN_1M_RETURN
                  and range_10_pct <= BASE_MAX_RANGE_10
                  and above_20
                  and above_50
                  and dry_up >= 40
              )

              if is_base_watch:
                  return "Base Breakout Watch"

              return None


          # =====================================================
          # Intraday EP / BO classification
          # =====================================================

          def get_market_elapsed_minutes_utc():
              open_time = now_utc.replace(
                  hour=MARKET_OPEN_UTC_HOUR,
                  minute=MARKET_OPEN_UTC_MINUTE,
                  second=0,
                  microsecond=0
              )

              elapsed = (now_utc - open_time).total_seconds() / 60.0
              elapsed = max(1.0, min(elapsed, MARKET_SESSION_MINUTES))

              return elapsed


          def classify_intraday_ep_bo(ticker, daily_df, intraday_df):
              completed_daily = get_completed_daily_df(
                  daily_df,
                  remove_today_partial=True
              )

              if completed_daily.empty or len(completed_daily) < 30:
                  return None

              if intraday_df is None or intraday_df.empty:
                  return None

              intraday_df = intraday_df.dropna(subset=["Close", "High", "Low", "Volume"])

              if intraday_df.empty:
                  return None

              indicators = calculate_intraday_indicators(intraday_df)

              if indicators is None:
                  return None

              prev_close = float(completed_daily["Close"].iloc[-1])
              prev_high = float(completed_daily["High"].iloc[-1])
              avg_vol_20 = float(completed_daily["Volume"].iloc[-20:].mean())
              adr_20 = calculate_adr(completed_daily, 20)

              current_price = indicators["price"]
              current_volume = indicators["volume_sum"]
              vwap = indicators["vwap"]
              ema9 = indicators["ema9"]
              ema20 = indicators["ema20"]
              opening_range_high = indicators["opening_range_high"]

              if current_price < MIN_PRICE:
                  return None

              if avg_vol_20 <= 0:
                  return None

              if vwap is None or ema9 is None or ema20 is None:
                  return None

              day_change = safe_pct_change(current_price, prev_close)
              raw_rvol = current_volume / avg_vol_20

              elapsed_minutes = get_market_elapsed_minutes_utc()
              expected_fraction = max(elapsed_minutes / MARKET_SESSION_MINUTES, 0.02)
              adjusted_rvol = raw_rvol / expected_fraction

              turnover = current_price * current_volume

              breaks_prev_high = current_price > prev_high
              breaks_opening_range = current_price > opening_range_high
              above_vwap = current_price > vwap
              above_ema9 = current_price > ema9
              ema9_above_ema20 = ema9 > ema20

              if turnover < INTRADAY_MIN_TURNOVER:
                  return None

              is_ep = (
                  day_change >= EP_MIN_DAY_CHANGE
                  and adjusted_rvol >= EP_MIN_ADJ_RVOL
                  and breaks_prev_high
                  and above_vwap
                  and above_ema9
              )

              is_bo = (
                  day_change >= BO_MIN_DAY_CHANGE
                  and adjusted_rvol >= BO_MIN_ADJ_RVOL
                  and breaks_prev_high
                  and breaks_opening_range
                  and above_vwap
                  and above_ema9
                  and ema9_above_ema20
                  and adr_20 >= BO_MIN_ADR
              )

              if is_ep:
                  setup_type = "Intraday EP Rocket"
              elif is_bo:
                  setup_type = "Intraday Breakout"
              else:
                  return None

              score = 0.0
              score += min(day_change * 4, 40)
              score += min(adjusted_rvol * 10, 30)
              score += 10 if breaks_prev_high else 0
              score += 8 if breaks_opening_range else 0
              score += 6 if above_vwap else 0
              score += 4 if ema9_above_ema20 else 0
              score += min(adr_20 * 2, 12)

              return {
                  "ticker": ticker,
                  "mode": "INTRADAY",
                  "setup_type": setup_type,
                  "price": round(current_price, 2),
                  "prev_close": round(prev_close, 2),
                  "prev_high": round(prev_high, 2),
                  "opening_range_high": round(opening_range_high, 2),
                  "day_change": round(day_change, 2),
                  "raw_rvol": round(raw_rvol, 2),
                  "adjusted_rvol": round(adjusted_rvol, 2),
                  "turnover_m": round(turnover / 1_000_000, 2),
                  "adr_20": round(adr_20, 2),
                  "vwap": round(vwap, 2),
                  "ema9": round(ema9, 2),
                  "ema20": round(ema20, 2),
                  "above_vwap": above_vwap,
                  "ema9_above_ema20": ema9_above_ema20,
                  "score": round(min(score, 100), 2),
                  "data_time": indicators["data_time"],
              }


          # =====================================================
          # Load config
          # =====================================================

          with open("config.yaml", "r") as f:
              config = yaml.safe_load(f)

          raw_tickers = config.get("stock_universe", [])

          tickers = []
          seen = set()

          for raw in raw_tickers:
              ticker = clean_ticker(raw)

              if not ticker:
                  continue

              if ticker in seen:
                  continue

              seen.add(ticker)
              tickers.append(ticker)

          universe_set = set(tickers)

          for watch in sorted(WATCH_DEBUG_TICKERS):
              if watch not in universe_set:
                  print(f"DEBUG {watch}: not in stock_universe")

          print(f"Mode: {MODE_NAME}")
          print(f"HK time: {hk_now.strftime('%Y-%m-%d %H:%M')}")
          print(f"UTC time: {now_utc.strftime('%Y-%m-%d %H:%M')}")
          print(f"Loaded {len(tickers)} tickers")

          # =====================================================
          # Download benchmark daily data
          # =====================================================

          print("Downloading SPY / QQQ daily benchmark...")

          spy_df = yf.download(
              "SPY",
              period="1y",
              interval="1d",
              progress=False,
              auto_adjust=False
          )

          qqq_df = yf.download(
              "QQQ",
              period="1y",
              interval="1d",
              progress=False,
              auto_adjust=False
          )

          spy_df = flatten_yfinance_df(spy_df).dropna(subset=["Close", "High", "Low"])
          qqq_df = flatten_yfinance_df(qqq_df).dropna(subset=["Close", "High", "Low"])

          spy_daily_completed = get_completed_daily_df(
              spy_df,
              remove_today_partial=IS_INTRADAY_MODE
          )

          qqq_daily_completed = get_completed_daily_df(
              qqq_df,
              remove_today_partial=IS_INTRADAY_MODE
          )

          results = []
          stale_count = 0
          skipped_count = 0

          batch_size = 30 if IS_INTRADAY_MODE else 45

          # =====================================================
          # Main loop
          # =====================================================

          for i in range(0, len(tickers), batch_size):
              batch = tickers[i:i + batch_size]
              batch_str = " ".join(batch)

              print(f"Processing batch {i} to {i + len(batch)}")

              try:
                  daily_data = yf.download(
                      batch_str,
                      period="1y",
                      interval="1d",
                      group_by="ticker",
                      progress=False,
                      auto_adjust=False,
                      threads=True
                  )
              except Exception as e:
                  print(f"Daily batch failed: {e}")
                  continue

              intraday_data = None

              if IS_INTRADAY_MODE:
                  try:
                      intraday_data = yf.download(
                          batch_str,
                          period="1d",
                          interval="5m",
                          group_by="ticker",
                          progress=False,
                          auto_adjust=False,
                          prepost=False,
                          threads=True
                      )
                  except Exception as e:
                      print(f"Intraday batch failed: {e}")
                      intraday_data = None

              for ticker in batch:
                  try:
                      daily_df = extract_ticker_df(daily_data, ticker, len(batch))
                      daily_df = daily_df.dropna(subset=["Close", "High", "Low"])

                      if daily_df.empty or len(daily_df) < 150:
                          debug_skip(ticker, "daily data too short or empty")
                          skipped_count += 1
                          continue

                      # =================================================
                      # Intraday EP / BO mode
                      # =================================================

                      if IS_INTRADAY_MODE:
                          intraday_df = extract_ticker_df(
                              intraday_data,
                              ticker,
                              len(batch)
                          ) if intraday_data is not None else pd.DataFrame()

                          result = classify_intraday_ep_bo(
                              ticker=ticker,
                              daily_df=daily_df,
                              intraday_df=intraday_df
                          )

                          if result is None:
                              debug_skip(ticker, "no intraday EP / BO setup")
                              skipped_count += 1
                              continue

                          results.append(result)
                          continue

                      # =================================================
                      # EOD setup mode
                      # =================================================

                      daily_completed = get_completed_daily_df(
                          daily_df,
                          remove_today_partial=False
                      )

                      if daily_completed.empty or len(daily_completed) < 220:
                          debug_skip(ticker, "completed daily data too short")
                          skipped_count += 1
                          continue

                      is_stale, price_date, age_days = is_stale_daily_data(daily_completed)

                      if is_stale:
                          debug_skip(ticker, f"stale daily data date={price_date}, age={age_days}")
                          stale_count += 1
                          continue

                      current_price = float(daily_completed["Close"].iloc[-1])

                      if current_price < MIN_PRICE:
                          debug_skip(ticker, f"price too low {current_price}")
                          skipped_count += 1
                          continue

                      avg_dollar_volume = calculate_avg_dollar_volume(daily_completed, 20)

                      if avg_dollar_volume < MIN_AVG_DOLLAR_VOLUME:
                          debug_skip(ticker, f"avg dollar volume too low ${avg_dollar_volume / 1_000_000:.1f}M")
                          skipped_count += 1
                          continue

                      adr_20 = calculate_adr(daily_completed, 20)
                      returns = calculate_returns(daily_completed)
                      distance_52w = calculate_distance_from_52w_high(daily_completed)

                      momentum_score, momentum_details = calculate_momentum_score(
                          daily_completed,
                          spy_df=spy_daily_completed,
                          qqq_df=qqq_daily_completed
                      )

                      consolidation_score, consolidation_details = calculate_consolidation_score(daily_completed)

                      pivot = consolidation_details.get("pivot")
                      stop = consolidation_details.get("stop")
                      risk_pct = consolidation_details.get("risk_pct")

                      setup_type = classify_eod_setup(
                          current_price=current_price,
                          adr_20=adr_20,
                          avg_dollar_volume=avg_dollar_volume,
                          returns=returns,
                          distance_52w=distance_52w,
                          risk_pct=risk_pct,
                          sma_details=momentum_details,
                          consolidation_details=consolidation_details
                      )

                      if setup_type is None:
                          debug_skip(
                              ticker,
                              f"no EOD setup | ADR={adr_20:.2f}% | "
                              f"1M={returns['ret_1m']:.2f}% | "
                              f"3M={returns['ret_3m']:.2f}% | "
                              f"Dist52W={distance_52w:.2f}% | "
                              f"Risk={risk_pct} | "
                              f"Range10={consolidation_details.get('range_10_pct', 999):.2f}% | "
                              f"DryUp={consolidation_details.get('volume_dry_up_score', 0):.1f} | "
                              f"SMA50={momentum_details.get('sma_50')} | "
                              f"SMA200={momentum_details.get('sma_200')} | "
                              f"SMA50Up={momentum_details.get('sma_50_turning_up')}"
                          )
                          skipped_count += 1
                          continue

                      buy_signal = (momentum_score * 0.6) + (consolidation_score * 0.4)

                      if setup_type == "Second Launch / Repair":
                          buy_signal += 3

                      if setup_type == "Base Breakout Watch":
                          buy_signal += 5

                      buy_signal = max(0.0, min(buy_signal, 100.0))

                      if setup_type == "High Tight Leader":
                          required_score = HIGH_TIGHT_MIN_SCORE
                      elif setup_type == "Second Launch / Repair":
                          required_score = REPAIR_MIN_SCORE
                      else:
                          required_score = BASE_MIN_SCORE

                      if buy_signal < required_score:
                          debug_skip(ticker, f"score too low {buy_signal:.1f} < {required_score}")
                          skipped_count += 1
                          continue

                      reason_bits = [
                          setup_type,
                          f"ADR {adr_20:.1f}%",
                          f"1M {returns['ret_1m']:.1f}%",
                          f"3M {returns['ret_3m']:.1f}%",
                          f"距52W高 {distance_52w:.1f}%",
                          f"10日range {consolidation_details.get('range_10_pct', 999):.1f}%",
                          f"risk {risk_pct:.1f}%",
                      ]

                      if setup_type == "Base Breakout Watch":
                          reason_bits.append(f"Base ADR區間 {BASE_MIN_ADR}-{BASE_MAX_ADR}%")

                      if momentum_details.get("sma_50_turning_up", False):
                          reason_bits.append("50MA轉上")

                      if consolidation_details.get("volume_dry_up_score", 0) >= 40:
                          reason_bits.append("縮量整理")

                      results.append({
                          "ticker": ticker,
                          "mode": "EOD",
                          "setup_type": setup_type,
                          "price": round(current_price, 2),
                          "price_date": price_date,
                          "age_days": age_days,
                          "buy_signal": round(buy_signal, 2),
                          "momentum_score": round(momentum_score, 2),
                          "consolidation_score": round(consolidation_score, 2),
                          "adr_20": round(adr_20, 2),
                          "avg_dollar_volume_m": round(avg_dollar_volume / 1_000_000, 2),
                          "ret_1m": round(returns["ret_1m"], 2),
                          "ret_3m": round(returns["ret_3m"], 2),
                          "ret_6m": round(returns["ret_6m"], 2),
                          "distance_52w": round(distance_52w, 2),
                          "range_10_pct": round(consolidation_details.get("range_10_pct", 999.0), 2),
                          "pivot": pivot,
                          "stop": stop,
                          "risk_pct": risk_pct,
                          "sma_50": round(momentum_details.get("sma_50", np.nan), 2) if not pd.isna(momentum_details.get("sma_50", np.nan)) else None,
                          "sma_200": round(momentum_details.get("sma_200", np.nan), 2) if not pd.isna(momentum_details.get("sma_200", np.nan)) else None,
                          "reason": "；".join(reason_bits),
                      })

                  except Exception as e:
                      print(f"{ticker} failed: {e}")
                      skipped_count += 1
                      continue

          # =====================================================
          # Telegram output
          # =====================================================

          token = os.getenv("TELEGRAM_TOKEN")
          chat_id = os.getenv("TELEGRAM_CHAT_ID")

          if not results:
              msg = f"📭【{MODE_NAME}】今日暫時無符合條件股票。\n\n"
              msg += f"HK Time：{hk_now.strftime('%Y-%m-%d %H:%M')}\n"
              msg += f"UTC Time：{now_utc.strftime('%Y-%m-%d %H:%M')}\n"
              msg += f"Stale skipped：{stale_count}\n"
              msg += f"Other skipped：{skipped_count}\n"

              send_telegram_message(token, chat_id, msg)
              print(msg)
              json_rows = []

          else:
              df_res = pd.DataFrame(results)

              if IS_INTRADAY_MODE:
                  df_res = df_res.sort_values(
                      by=["score", "adjusted_rvol", "day_change", "turnover_m"],
                      ascending=[False, False, False, False]
                  ).reset_index(drop=True)

                  top = df_res.head(12)

                  msg = "🔥【Kati 盤中 EP / BO 火箭監測】🔥\n\n"
                  msg += f"HK Time：{hk_now.strftime('%Y-%m-%d %H:%M')}\n"
                  msg += f"UTC Time：{now_utc.strftime('%Y-%m-%d %H:%M')}\n"
                  msg += f"入選數量：{len(df_res)}\n"
                  msg += "條件：5m data、突破昨日高位/開市區間、VWAP、EMA9/20、time-adjusted RVOL、成交額≥$20M\n\n"

                  for idx, row in top.iterrows():
                      msg += f"#{idx + 1} {row['ticker']}｜{row['setup_type']}\n"
                      msg += f"   現價: ${row['price']} | 漲幅: +{row['day_change']:.1f}% | 分數: {row['score']:.1f}\n"
                      msg += f"   前高: ${row['prev_high']} | 前收: ${row['prev_close']} | OR High: ${row['opening_range_high']}\n"
                      msg += f"   VWAP: ${row['vwap']} | EMA9: ${row['ema9']} | EMA20: ${row['ema20']}\n"
                      msg += f"   Raw RVOL: {row['raw_rvol']:.2f} | Adj RVOL: {row['adjusted_rvol']:.2f}\n"
                      msg += f"   Turnover: ${row['turnover_m']:.1f}M | ADR: {row['adr_20']:.1f}%\n"
                      msg += f"   Data time: {row['data_time']}\n"
                      msg += "   動作：即刻睇圖 + 查 catalyst，不自動追入。\n\n"

              else:
                  setup_order = {
                      "High Tight Leader": 1,
                      "Second Launch / Repair": 2,
                      "Base Breakout Watch": 3,
                  }

                  df_res["setup_rank"] = df_res["setup_type"].map(setup_order).fillna(9)

                  df_res = df_res.sort_values(
                      by=["setup_rank", "buy_signal", "adr_20", "ret_3m", "distance_52w"],
                      ascending=[True, False, False, False, True]
                  ).reset_index(drop=True)

                  top = df_res.head(15)

                  msg = "🌙【Kati 盤後 Setup 監測｜Leader + Repair + Base】🌙\n\n"
                  msg += f"HK Time：{hk_now.strftime('%Y-%m-%d %H:%M')}\n"
                  msg += f"UTC Time：{now_utc.strftime('%Y-%m-%d %H:%M')}\n"
                  msg += f"入選數量：{len(df_res)}\n"
                  msg += f"Stale skipped：{stale_count}\n"
                  msg += f"Other skipped：{skipped_count}\n"
                  msg += "類型：High Tight / Second Launch Repair / Base Breakout Watch\n"
                  msg += "ADR規則：Leader≥4%，Repair≥4%，Base=2.5–4.0%\n"
                  msg += "注意：盤後模式不設上限時間；只要不是盤中 window，05:20 HK 後都可以跑 setup。\n\n"

                  for idx, row in top.iterrows():
                      msg += f"#{idx + 1} {row['ticker']}｜{row['setup_type']}\n"
                      msg += f"   Close: ${row['price']} | Date: {row['price_date']} | Age: {row['age_days']}d\n"
                      msg += f"   分數: {row['buy_signal']:.1f} | 動能: {row['momentum_score']:.1f} | 整理: {row['consolidation_score']:.1f}\n"
                      msg += f"   ADR: {row['adr_20']:.1f}% | 1M: {row['ret_1m']:.1f}% | 3M: {row['ret_3m']:.1f}% | 距52W高: {row['distance_52w']:.1f}%\n"
                      msg += f"   10日range: {row['range_10_pct']:.1f}% | Pivot: {row['pivot']} | Stop: {row['stop']} | Risk: {row['risk_pct']}%\n"
                      msg += f"   50MA: {row['sma_50']} | 200MA: {row['sma_200']}\n"
                      msg += f"   原因: {row['reason']}\n\n"

              send_telegram_message(token, chat_id, msg)
              print("✓ Telegram message sent")

              # Convert the already sorted Telegram selection to JSON-safe values.
              json_rows = json.loads(top.to_json(orient="records", date_format="iso"))

          # =====================================================
          # Fixed public JSON outputs
          # =====================================================

          os.makedirs("data", exist_ok=True)

          mode_slug = "intraday" if IS_INTRADAY_MODE else "eod"
          mode_file = f"data/latest_{mode_slug}_watchlist.json"
          latest_file = "data/today_watchlist.json"

          payload = {
              "schema_version": 1,
              "generated_at_utc": now_utc.replace(microsecond=0).isoformat() + "Z",
              "generated_at_hk": hk_now.replace(microsecond=0).isoformat() + "+08:00",
              "mode": "INTRADAY" if IS_INTRADAY_MODE else "EOD",
              "mode_name": MODE_NAME,
              "market_date": (
                  json_rows[0].get("price_date")
                  if json_rows and not IS_INTRADAY_MODE
                  else now_utc.strftime("%Y-%m-%d")
              ),
              "selected_count": len(results),
              "published_count": len(json_rows),
              "stale_skipped": stale_count,
              "other_skipped": skipped_count,
              "stocks": json_rows,
          }

          for path in (mode_file, latest_file):
              with open(path, "w", encoding="utf-8") as f:
                  json.dump(payload, f, ensure_ascii=False, indent=2)
                  f.write("\n")
              print(f"✓ JSON written: {path}")

          PYTHON_SCRIPT

      - name: Commit latest watchlist JSON
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/today_watchlist.json data/latest_intraday_watchlist.json data/latest_eod_watchlist.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No JSON changes to commit."
            exit 0
          fi

          git commit -m "Update latest stock watchlist JSON"

          # Retry once if another scheduled run updated the branch first.
          if ! git push; then
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
