name: Daily Stock Screening (Git-Based Storage)

on:
  schedule:
    # 這裡設定了多個定時器 (香港時間)：
    # 21:45跑一次、22:15跑一次、22:45跑一次、23:15跑一次、23:45跑一次
    - cron: '45 13 * * 1-5'  # UTC 13:45 = 香港 21:45
    - cron: '15 14 * * 1-5'  # UTC 14:15 = 香港 22:15
    - cron: '45 14 * * 1-5'  # UTC 14:45 = 香港 22:45
    - cron: '15 15 * * 1-5'  # UTC 15:15 = 香港 23:15
    - cron: '45 15 * * 1-5'  # UTC 15:45 = 香港 23:45
    
    # 凌晨 05:05 收市後的總結依然保留
    - cron: '5 21 * * 1-5'

    # Backup：香港時間 06:12
    - cron: '12 22 * * 1-5'

  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: 'Force refresh all fundamentals (ignore cache)'
        required: false
        type: boolean
        default: false

jobs:
  screen-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pyyaml requests

      - name: Run Direct Qullamaggie Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import yaml
          import yfinance as yf
          import pandas as pd
          import numpy as np
          import requests
          from datetime import datetime

          # =====================================================
          # 自動識別市場時段 (香港時間)
          # =====================================================
          current_hour_hk = (datetime.utcnow().hour + 8) % 24
          
          # 如果在香港時間晚上 21:00 至 24:00 之間運行，自動切換為【盤中 EP 火箭模式】
          IS_INTRADAY_MODE = 21 <= current_hour_hk <= 23
          
          MIN_PRICE = 5.0
          MIN_AVG_DOLLAR_VOLUME = 20_000_000
          MAX_SETUP_RISK_PCT = 12.0
          MAX_STALE_DAYS = 3 if not IS_INTRADAY_MODE else 999  # 盤中放行檢查

          # Setup 篩選閾值
          HIGH_TIGHT_MAX_52W_DISTANCE = 25.0
          HIGH_TIGHT_MIN_ADR = 4.0
          HIGH_TIGHT_MIN_3M_RETURN = 25.0
          HIGH_TIGHT_MIN_BUY_SIGNAL = 50.0

          REPAIR_MAX_52W_DISTANCE = 60.0
          REPAIR_MIN_ADR = 3.5
          REPAIR_MIN_1M_RETURN = 8.0
          REPAIR_MIN_3M_RETURN = 20.0
          REPAIR_MIN_BUY_SIGNAL = 45.0

          INVALID_TICKERS = {
              "INFO", "ATVI", "ALXN", "CELG", "CTXS", "MXIM", "NUAN",
              "ABC", "BLL", "COG", "DISCA", "DISCK", "DRE", "FISV",
              "KSU", "MYL", "NBL", "PEAK", "FB", "NDX", "ARKG",
              "INFQ", "SOLS", "IMSR", "SPCX", "EIP", "ILLM"
          }

          # =====================================================
          # Helper functions
          # =====================================================
          def clean_ticker(ticker):
              if ticker is None: return None
              ticker = str(ticker).upper().strip()
              if not ticker: return None
              ticker = ticker.split("#")[0].strip()
              ticker = ticker.replace(".", "-")
              if ticker in INVALID_TICKERS: return None
              if not ticker.replace("-", "").isalnum(): return None
              return ticker

          def flatten_yfinance_df(df):
              if isinstance(df.columns, pd.MultiIndex):
                  df.columns = df.columns.get_level_values(0)
              return df

          def safe_pct_change(current, previous):
              if previous is None or previous == 0 or pd.isna(previous): return 0.0
              return ((current - previous) / previous) * 100.0

          def is_stale_price_data(df, max_stale_days=MAX_STALE_DAYS):
              if IS_INTRADAY_MODE: 
                  return False, datetime.utcnow().strftime("%Y-%m-%d"), 0
              if df is None or df.empty: return True, None, None
              clean_df = df.dropna(subset=["Close"])
              if clean_df.empty: return True, None, None
              last_date = pd.Timestamp(clean_df.index[-1])
              if last_date.tzinfo is not None: last_date = last_date.tz_convert(None)
              age_days = (datetime.utcnow().date() - last_date.date()).days
              return age_days > max_stale_days, last_date.strftime("%Y-%m-%d"), age_days

          def calculate_adr(df, period=20):
              if df is None or df.empty or len(df) < period: return 0.0
              recent = df.iloc[-period:]
              adr = (((recent["High"] - recent["Low"]) / recent["Close"]) * 100).mean()
              return float(adr) if not pd.isna(adr) else 0.0

          def calculate_avg_dollar_volume(df, period=20):
              if df is None or df.empty or len(df) < period: return 0.0
              recent = df.iloc[-period:]
              val = (recent["Close"] * recent["Volume"]).mean()
              return float(val) if not pd.isna(val) else 0.0

          def calculate_returns(df):
              close = df["Close"]
              current = float(close.iloc[-1])
              return {
                  "ret_1m": safe_pct_change(current, float(close.iloc[-21])) if len(close) > 21 else 0.0,
                  "ret_3m": safe_pct_change(current, float(close.iloc[-63])) if len(close) > 63 else 0.0,
                  "ret_6m": safe_pct_change(current, float(close.iloc[-126])) if len(close) > 126 else 0.0,
              }

          def calculate_distance_from_52w_high(df):
              if df is None or df.empty or len(df) < 100: return 999.0
              recent = df.iloc[-252:] if len(df) >= 252 else df
              current = float(df["Close"].iloc[-1])
              high_52w = float(recent["High"].max())
              return ((high_52w - current) / high_52w) * 100.0 if high_52w > 0 else 999.0

          def calculate_relative_strength(stock_df, benchmark_df, period=63):
              if stock_df.empty or benchmark_df.empty or len(stock_df) <= period or len(benchmark_df) <= period: return 0.0
              return safe_pct_change(float(stock_df["Close"].iloc[-1]), float(stock_df["Close"].iloc[-period])) - \
                     safe_pct_change(float(benchmark_df["Close"].iloc[-1]), float(benchmark_df["Close"].iloc[-period]))

          # =====================================================
          # 核心篩選器
          # =====================================================
          with open("config.yaml", "r") as f:
              config = yaml.safe_load(f)

          tickers = list(set([clean_ticker(t) for t in config.get("stock_universe", []) if clean_ticker(t)]))
          print(f"模式：{'【盤中 EP 火箭模式】' if IS_INTRADAY_MODE else '【收市常規總結模式】'}")
          print(f"成功載入 {len(tickers)} 隻股票，開始下載...")

          spy_df = flatten_yfinance_df(yf.download("SPY", period="1y", progress=False))
          qqq_df = flatten_yfinance_df(yf.download("QQQ", period="1y", progress=False))

          results = []
          batch_size = 40
          for i in range(0, len(tickers), batch_size):
              batch = tickers[i:i + batch_size]
              try:
                  data = yf.download(" ".join(batch), period="1y", group_by="ticker", progress=False, threads=True)
              except: continue

              for ticker in batch:
                  try:
                      df = data if len(batch) == 1 else (data[ticker].copy() if ticker in data.columns.levels[0] else None)
                      if df is None or df.empty: continue
                      df = flatten_yfinance_df(df).dropna(subset=["Close", "High", "Low"])
                      if len(df) < 150: continue

                      current_price = float(df["Close"].iloc[-1])
                      if current_price < MIN_PRICE: continue

                      # 數據更新檢查
                      is_stale, price_date, age_days = is_stale_price_data(df)
                      if is_stale: continue

                      # 核心量化計算
                      adr_20 = calculate_adr(df)
                      avg_dollar_vol = calculate_avg_dollar_volume(df)
                      if avg_dollar_vol < MIN_AVG_DOLLAR_VOLUME: continue

                      # 盤中與收市分流邏輯
                      if IS_INTRADAY_MODE:
                          # 1. 盤中 EP 火箭條件
                          prev_close = float(df["Close"].iloc[-2])
                          prev_high = float(df["High"].iloc[-2])
                          day_change = ((current_price - prev_close) / prev_close) * 100
                          
                          # 計算盤中實時 RVOL
                          avg_vol_20 = df["Volume"].iloc[-21:-1].mean()
                          current_vol = float(df["Volume"].iloc[-1])
                          rvol = current_vol / avg_vol_20 if avg_vol_20 > 0 else 0

                          # 執行 Kati 的四大 EP 斷層硬指標 (放寬成交額至 $20M 以包容盤中剛開市的狀態)
                          if day_change >= 7.5 and rvol >= 2.0 and current_price > prev_high and (current_price * current_vol) >= 20_000_000:
                              results.append({
                                  "ticker": ticker, "mode": "EP_ROCKET", "price": round(current_price, 2),
                                  "change": round(day_change, 1), "rvol": round(rvol, 1),
                                  "turnover": round((current_price * current_vol)/1_000_000, 1)
                              })
                      else:
                          # 2. 收市常規總結模式
                          recent_10 = df.iloc[-10:]
                          h10, l10 = float(recent_10["High"].max()), float(recent_10["Low"].min())
                          range_10 = ((h10 - l10) / l10) * 100
                          risk_pct = ((h10 - l10) / h10) * 100
                          if risk_pct > MAX_SETUP_RISK_PCT: continue

                          # 簡單動能與趨勢打分
                          returns = calculate_returns(df)
                          dist_52w = calculate_distance_from_52w_high(df)
                          if dist_52w <= 25 and range_10 <= 12:
                              results.append({
                                  "ticker": ticker, "mode": "EOD_SUMMARY", "price": round(current_price, 2),
                                  "range_10": round(range_10, 1), "risk": round(risk_pct, 1), "dist_52w": round(dist_52w, 1)
                              })
                  except: continue

          # =====================================================
          # 模式連動發送 Telegram
          # =====================================================
          token, chat_id = os.getenv("TELEGRAM_TOKEN"), os.getenv("TELEGRAM_CHAT_ID")
          if not results:
              if not IS_INTRADAY_MODE:
                  requests.post(f"https://api.telegram.org/bot{token}/sendMessage", data={"chat_id": chat_id, "text": "🌙【收市總結】今日無完全符合形態之強勢股。"})
              print("無符合條件股票")
          else:
              df_res = pd.DataFrame(results)
              if IS_INTRADAY_MODE:
                  msg = "🔥【Kati 核心 EP 盤中火箭預警】🔥\n\n"
                  for _, row in df_res.iterrows():
                      msg += f"🚀 股票: {row['ticker']}\n"
                      msg += f"   現價: ${row['price']} | 實時漲幅: +{row['change']}%\n"
                      msg += f"   相對成交量 (RVOL): {row['rvol']} 倍\n"
                      msg += f"   當前成交額: ${row['turnover']}M (大資金集結)\n"
                      msg += f"   💡 動作: 衝去睇下有無【財報/法案】催化劑！\n\n"
              else:
                  msg = "🌙【Qullamaggie 收市強勢股 Top 15 總結】🌙\n\n"
                  for idx, row in df_res.head(15).iterrows():
                      msg += f"#{idx+1} 股票: {row['ticker']} | 價: ${row['price']}\n"
                      msg += f"   10日橫盤波幅: {row['range_10']}% | 預估止損風險: {row['risk']}%\n"
                      msg += f"   距離52週高位: {row['dist_52w']}%\n\n"
              
              requests.post(f"https://api.telegram.org/bot{token}/sendMessage", data={"chat_id": chat_id, "text": msg})
              print("✓ Telegram 訊號推送成功！")
          PYTHON_SCRIPT
