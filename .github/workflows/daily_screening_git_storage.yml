name: Daily Stock Screening (Git-Based Storage)

on:
  schedule:
    # 香港時間凌晨 05:05 AM (美股收市後) 自動在雲端執行
    - cron: '5 21 * * 1-5'

  # 容許在 GitHub 網頁上手動按「Run workflow」觸發測試
  workflow_dispatch:
    inputs:
      force_full_refresh:
        description: 'Force refresh all fundamentals (ignore cache)'
        required: false
        type: boolean
        default: false

jobs:
  screen-stocks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # 快速下載，節省雲端時間

      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "time=$(date +'%H:%M:%S')" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy pyyaml requests

      - name: Run Direct Qullamaggie Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 << 'PYTHON_SCRIPT'
          import os
          import yaml
          import yfinance as yf
          import pandas as pd
          import numpy as np
          import requests
          from datetime import datetime, timedelta

          # 1. 讀取 config.yaml 的股票宇宙
          with open('config.yaml', 'r') as f:
              config = yaml.safe_load(f)
          tickers = config['stock_universe']
          
          # 剔除空值
          tickers = [t for t in tickers if t and isinstance(t, str)]
          print(f"成功載入 {len(tickers)} 隻股票，開始進行雲端直接篩選...")

          results = []
          
          # 2. 分批下載半年歷史數據，防止被 yfinance 限流 (每批 50 隻)
          batch_size = 50
          for i in range(0, len(tickers), batch_size):
              batch = tickers[i:i+batch_size]
              tickers_str = " ".join(batch)
              print(f"正在下載第 {i} 至 {i+len(batch)} 隻股票數據...")
              try:
                  data = yf.download(tickers_str, period="6mo", group_by='ticker', progress=False)
              except Exception as e:
                  print(f"批次 {i} 下載失敗: {e}")
                  continue

              for ticker in batch:
                  try:
                      # 提取單隻股票數據
                      if len(batch) == 1:
                          df = data
                      else:
                          if ticker not in data.columns.levels[0]: continue
                          df = data[ticker]
                      
                      df = df.dropna(subset=['Close'])
                      if len(df) < 50: continue

                      close_prices = df['Close']
                      current_price = float(close_prices.iloc[-1])

                      # === Qullamaggie 指標技術計算 ===
                      sma_10 = close_prices.rolling(window=10).mean().iloc[-1]
                      sma_20 = close_prices.rolling(window=20).mean().iloc[-1]
                      sma_50 = close_prices.rolling(window=50).mean().iloc[-1]
                      sma_200 = close_prices.rolling(window=200).mean().iloc[-1] if len(df) >= 200 else sma_50

                      # 算動能分 (最高 70 分)
                      momentum_score = 0.0
                      if current_price > sma_10: momentum_score += 15
                      if current_price > sma_20: momentum_score += 15
                      if current_price > sma_50: momentum_score += 20
                      if current_price > sma_200: momentum_score += 20

                      price_50_days_ago = close_prices.iloc[-50] if len(df) >= 50 else close_prices.iloc[0]
                      gain_pct = ((current_price - price_50_days_ago) / price_50_days_ago) * 100
                      if gain_pct >= 30: momentum_score += 30

                      # 算高位窄幅整理度 (最高 30 分)
                      recent_data = df.iloc[-10:]
                      highest = recent_data['High'].max()
                      lowest = recent_data['Low'].min()
                      volatility = ((highest - lowest) / lowest) * 100

                      tightness_score = 0.0
                      if volatility <= 5.0: tightness_score = 100.0
                      elif volatility <= 10.0: tightness_score = 70.0
                      elif volatility <= 15.0: tightness_score = 40.0

                      # 檢查爆量
                      volume_spike = False
                      if 'Volume' in df.columns and len(df) >= 21:
                          current_volume = df['Volume'].iloc[-1]
                          avg_volume = df['Volume'].iloc[-21:-1].mean()
                          if current_volume > (avg_volume * 1.5): volume_spike = True

                      # 總分
                      buy_signal = (momentum_score * 0.5) + (tightness_score * 0.5)
                      if volume_spike and tightness_score > 50: buy_signal += 10
                      buy_signal = min(buy_signal, 100.0)

                      # 只記錄有基本動能的強勢股
                      if buy_signal >= 50:
                          results.append({
                              'ticker': ticker,
                              'current_price': round(current_price, 2),
                              'buy_signal': buy_signal,
                              'momentum_score': momentum_score,
                              'tightness_score': tightness_score,
                              'sma_10': round(sma_10, 2)
                          })
                  except:
                      continue

          # 3. 排序並發送 Telegram
          if results:
              df_res = pd.DataFrame(results)
              df_res = df_res.sort_values('buy_signal', ascending=False).reset_index(drop=True)
              top_picks = df_res.head(15)

              token = os.getenv("TELEGRAM_TOKEN")
              chat_id = os.getenv("TELEGRAM_CHAT_ID")

              msg = "🚀 【Qullamaggie 強勢股火箭監測】 🚀\n\n"
              for idx, row in top_picks.iterrows():
                  msg += f"#{idx+1} 股票: {row['ticker']} (${row['current_price']})\n"
                  msg += f"   📈 總評分: {row['buy_signal']:.1f} | 動能: {row['momentum_score']:.1f}\n"
                  msg += f"   🔍 窄幅整理度: {row['tightness_score']:.1f} | 10日線: ${row['sma_10']}\n\n"

              url = f"https://api.telegram.org/bot{token}/sendMessage"
              requests.post(url, data={"chat_id": chat_id, "text": msg})
              print("✓ Telegram 訊號推送成功！")
          else:
              print("今日全市場無符合 Qullamaggie 動能條件的股票。")
          PYTHON_SCRIPT
